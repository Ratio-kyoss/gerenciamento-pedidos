<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Gerenciamento de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h1>📦 Pedidos</h1>
            <p>Sistema de Gerenciamento de Pedidos</p>

            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário">
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>

            <button class="btn btn-primary" onclick="doLogin()">Entrar</button>

            <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:#888;">
                Não tem conta?
                <a href="#" onclick="showRegister()" style="color:#e94560;">Cadastre-se</a>
            </p>

            <!-- Formulário de cadastro (oculto) -->
            <div id="registerForm" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                <h3 style="margin-bottom:16px; color:#1a1a2e;">Criar conta</h3>

                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="regUsername" placeholder="Escolha um usuário">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Seu email">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="regPassword" placeholder="Escolha uma senha">
                </div>

                <div class="form-group">
                    <label>Perfil</label>
                    <select id="regRole">
                        <option value="USER">Usuário</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                </div>

                <button class="btn btn-secondary" onclick="doRegister()" style="width:100%;">
                    Criar conta
                </button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Redireciona se já estiver logado
        if (getToken()) window.location.href = 'pages/dashboard.html';

        function showAlert(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        function showRegister() {
            const form = document.getElementById('registerForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showAlert('alertError', 'Preencha todos os campos.');
                return;
            }

            const res = await api.login(username, password);

            if (res.ok) {
                saveAuth(res.data.token, res.data.username, res.data.role);
                window.location.href = 'pages/dashboard.html';
            } else {
                showAlert('alertError', 'Usuário ou senha inválidos.');
            }
        }

        async function doRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email    = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const role     = document.getElementById('regRole').value;

            if (!username || !email || !password) {
                showAlert('alertError', 'Preencha todos os campos do cadastro.');
                return;
            }

            const res = await api.register({ username, email, password, role });

            if (res.ok) {
                showAlert('alertSuccess', 'Conta criada! Faça o login.');
                document.getElementById('registerForm').style.display = 'none';
            } else {
                showAlert('alertError', res.data || 'Erro ao criar conta.');
            }
        }

        // Login com Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
